name: build and deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/tejabudumuru3/codeplay:latest
            ghcr.io/tejabudumuru3/codeplay:${{ github.sha }}

      - name: Deploy to machine 
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            docker login ghcr.io -u TejaBudumuru3 -p ${{ secrets.GHCR_PAT }}
            docker pull ghcr.io/tejabudumuru3/codeplay:latest
            docker stop codeplay || true
            docker rm codeplay || true  
            docker run -d \
              --name codeplay \
              --restart always \
              -p 3000:3000 \
              --env-file  /home/ubuntu/.env \
              ghcr.io/tejabudumuru3/codeplay:latest
            docker image prune -f